# Triton Inference Server 部署配置
#
# 使用方法：
#   docker-compose up -d
#
# 前置条件：
#   - 安装 Docker + NVIDIA Container Toolkit
#   - model_repository/ 目录已准备好（阶段3的输出）
#   - TensorRT engine 已放入对应目录

version: '3.8'

services:
  triton-ocr:
    image: nvcr.io/nvidia/tritonserver:24.05-py3
    container_name: triton-ocr-server
    restart: unless-stopped
    
    # GPU 配置
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1  # 使用 1 张 GPU，改成 all 用所有 GPU
              capabilities: [gpu]
    
    # 端口映射
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC（推荐用这个，更快）
      - "8002:8002"   # Metrics（Prometheus 监控）
    
    # 挂载模型仓库
    volumes:
      - ../step3_triton_config/model_repository:/models
      - ./triton_logs:/opt/tritonserver/logs
    
    # 启动命令
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=1
      --log-info=true
      --log-warning=true
      --log-error=true
      --metrics-port=8002
      --allow-metrics=true
      --allow-gpu-metrics=true
      --grpc-keepalive-time=60000
      --grpc-keepalive-timeout=20000
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # 环境变量
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TF_CPP_MIN_LOG_LEVEL=2

